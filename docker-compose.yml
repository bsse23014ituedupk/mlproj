version: "3.8"

services:
  # --- MLflow Tracking Server ---
  mlflow:
    build: .
    container_name: mlflow-server
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlruns/mlflow.db
      --default-artifact-root ./mlruns
      --host 0.0.0.0
      --port 5000
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/app/mlruns
    environment:
      - MLFLOW_TRACKING_URI=http://localhost:5000
    networks:
      - water-net

  # --- One-Shot Trainer ---
  trainer:
    build: .
    container_name: water-trainer
    command: python -m src.models.train
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./reports:/app/reports
      - ./mlruns:/app/mlruns
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    depends_on:
      - mlflow
    networks:
      - water-net

  # --- FastAPI Prediction Service ---
  api:
    build: .
    container_name: water-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - API_HOST=0.0.0.0
      - API_PORT=8000
    depends_on:
      - mlflow
    networks:
      - water-net

networks:
  water-net:
    driver: bridge
